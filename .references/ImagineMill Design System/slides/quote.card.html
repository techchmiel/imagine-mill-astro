<!-- @dsCard group="Slides" viewport="1280x720" name="Big Quote" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0}
 .slide{width:1280px;height:720px;position:relative;overflow:hidden;color:var(--text-on-navy);
   background-color:var(--navy-900);
   background-image:linear-gradient(rgba(56,176,232,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(56,176,232,.055) 1px,transparent 1px);
   background-size:34px 34px;font-family:var(--font-body);display:flex;flex-direction:column;justify-content:center;padding:0 110px;box-sizing:border-box}
 .glow{position:absolute;width:460px;height:460px;border-radius:50%;bottom:-180px;left:-120px;background:radial-gradient(circle,rgba(120,192,64,.28),transparent 68%)}
 .mark{font-family:var(--font-display);font-weight:800;font-size:120px;line-height:.6;color:var(--blue-400);opacity:.5}
 blockquote{font-family:var(--font-display);font-weight:600;font-size:48px;line-height:1.28;letter-spacing:-.01em;color:#fff;margin:8px 0 40px;max-width:24ch}
 .who{display:flex;align-items:center;gap:16px}
 .av{width:56px;height:56px;border-radius:50%;background:var(--gradient-screen);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;font-size:20px}
 .name{font-family:var(--font-display);font-weight:700;font-size:20px;color:#fff}
 .role{font-size:16px;color:var(--text-on-navy-muted)}
</style></head><body>
<div class="slide">
 <div class="glow"></div>
 <div class="mark">&ldquo;</div>
 <blockquote>We went from dreading Copilot to leading with it.</blockquote>
 <div class="who">
   <div class="av">DR</div>
   <div><div class="name">Dana Reyes</div><div class="role">IT Director, Northwind Traders</div></div>
 </div>
</div></body></html>
