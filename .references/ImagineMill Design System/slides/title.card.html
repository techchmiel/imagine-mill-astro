<!-- @dsCard group="Slides" viewport="1280x720" name="Title Slide" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0}
 .slide{width:1280px;height:720px;position:relative;overflow:hidden;color:var(--text-on-navy);
   background-color:var(--navy-800);
   background-image:linear-gradient(rgba(56,176,232,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(56,176,232,.06) 1px,transparent 1px);
   background-size:34px 34px;font-family:var(--font-body);display:flex;flex-direction:column;justify-content:center;padding:0 96px;box-sizing:border-box}
 .glow{position:absolute;width:520px;height:520px;border-radius:50%;top:-160px;right:-120px;
   background:radial-gradient(circle,rgba(56,176,232,.45),transparent 68%)}
 .eyebrow{font-family:var(--font-display);font-weight:600;font-size:19px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue-300);display:flex;align-items:center;gap:14px}
 h1{font-family:var(--font-display);font-weight:800;font-size:82px;line-height:1.02;letter-spacing:-.02em;color:#fff;margin:22px 0 26px;max-width:20ch}
 .sub{font-size:26px;color:var(--text-on-navy-muted);max-width:44ch;margin:0}
 .foot{position:absolute;left:96px;right:96px;bottom:56px;display:flex;align-items:center;gap:18px}
 .rule{flex:1;height:3px;border:0;border-radius:3px;background:var(--gradient-signal)}
 .node{width:18px;height:18px;border-radius:6px;border:3px solid var(--green-500)}
 img{height:40px}
</style></head><body>
<div class="slide">
 <div class="glow"></div>
 <div class="eyebrow"><span class="node"></span> Microsoft 365 · Copilot</div>
 <h1>Rolling out Copilot without the chaos</h1>
 <p class="sub">A calm, staged playbook for bringing AI into your modern workplace.</p>
 <div class="foot">
   <img src="../assets/logos/imaginemill-wordmark.png" alt="ImagineMill" style="filter:brightness(0) invert(1);opacity:.95">
   <hr class="rule">
   <span style="font-family:var(--font-mono);font-size:15px;color:var(--text-on-navy-muted)">imaginemill.io</span>
 </div>
</div></body></html>
