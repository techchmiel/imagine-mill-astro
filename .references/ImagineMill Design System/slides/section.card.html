<!-- @dsCard group="Slides" viewport="1280x720" name="Section Divider" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0}
 .slide{width:1280px;height:720px;position:relative;overflow:hidden;background:var(--gradient-screen-soft);
   font-family:var(--font-body);display:flex;flex-direction:column;justify-content:center;padding:0 96px;box-sizing:border-box}
 .num{font-family:var(--font-display);font-weight:800;font-size:150px;line-height:1;color:var(--blue-200);letter-spacing:-.03em}
 .eyebrow{font-family:var(--font-display);font-weight:600;font-size:20px;letter-spacing:.18em;text-transform:uppercase;color:var(--red-500);margin:0 0 10px}
 h1{font-family:var(--font-display);font-weight:800;font-size:64px;line-height:1.05;letter-spacing:-.02em;color:var(--navy-800);margin:6px 0 0;max-width:22ch}
 .nodes{display:flex;gap:10px;margin-top:34px}
 .node{width:16px;height:16px;border-radius:5px;border:3px solid}
 .on{background:currentColor}
</style></head><body>
<div class="slide">
 <div class="num">01</div>
 <p class="eyebrow">Phase one</p>
 <h1>Prepare the ground</h1>
 <div class="nodes">
   <span class="node on" style="color:var(--green-500)"></span>
   <span class="node" style="color:var(--blue-500)"></span>
   <span class="node" style="color:var(--red-500)"></span>
 </div>
</div></body></html>
