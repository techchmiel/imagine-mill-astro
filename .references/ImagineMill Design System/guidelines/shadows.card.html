<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation & Shadows" subtitle="Navy-tinted soft shadows + brand glow" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:24px 22px;background:var(--bg-page);font-family:var(--font-body)}
 .row{display:flex;gap:20px;flex-wrap:wrap}
 .item{display:flex;flex-direction:column;align-items:center;gap:9px}
 .box{width:82px;height:60px;background:var(--white);border-radius:var(--radius-md)}
 .n{font:600 11px var(--font-display);color:var(--navy-800)}
</style></head><body>
<div class="row">
 <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">xs</span></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-glow-blue)"></div><span class="n">glow-blue</span></div>
 <div class="item"><div class="box" style="box-shadow:var(--shadow-glow-green)"></div><span class="n">glow-green</span></div>
</div></body></html>
