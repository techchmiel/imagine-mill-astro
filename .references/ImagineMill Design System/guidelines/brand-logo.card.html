<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:0;font-family:var(--font-body)}
 .grid{display:grid;grid-template-columns:1fr 1fr}
 .cell{height:220px;display:flex;align-items:center;justify-content:center;padding:26px;position:relative}
 .white{background:var(--white)}
 .tint{background:var(--bg-page-tint)}
 img{max-width:86%;max-height:118px}
 .lab{position:absolute;top:0;left:0;margin:14px;font:600 10px var(--font-display);letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint)}
</style></head><body>
<div class="grid">
 <div class="cell white"><span class="lab">On white</span><img src="../assets/logos/imaginemill-logo-wide.png" alt="ImagineMill"></div>
 <div class="cell tint"><span class="lab">On blue tint</span><img src="../assets/logos/imaginemill-logo-wide.png" alt="ImagineMill"></div>
</div></body></html>
