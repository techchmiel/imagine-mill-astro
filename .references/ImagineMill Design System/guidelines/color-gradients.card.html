<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
 .stack{display:flex;flex-direction:column;gap:12px}
 .g{height:38px;border-radius:var(--radius-md);display:flex;align-items:center;padding:0 14px;box-shadow:var(--shadow-sm)}
 .lab{font:700 12px var(--font-display);letter-spacing:.04em}
 .code{font:400 11px var(--font-mono);margin-left:auto}
</style></head><body>
<div class="stack">
 <div class="g" style="background:var(--gradient-screen);color:#fff"><span class="lab">Screen</span><span class="code">--gradient-screen</span></div>
 <div class="g" style="background:var(--gradient-ink);color:#eaf1fb"><span class="lab">Ink</span><span class="code">--gradient-ink</span></div>
 <div class="g" style="background:var(--gradient-screen-soft);color:#0f74b4"><span class="lab">Screen&nbsp;Soft</span><span class="code">--gradient-screen-soft</span></div>
 <div class="g" style="background:var(--gradient-signal);color:#fff"><span class="lab" style="text-shadow:0 1px 2px rgba(0,0,0,.4)">Signal</span><span class="code" style="text-shadow:0 1px 2px rgba(0,0,0,.4)">--gradient-signal</span></div>
</div></body></html>
