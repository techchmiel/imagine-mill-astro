<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="From node markers to pills" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:18px 22px;background:var(--surface-card);font-family:var(--font-body)}
 .row{display:flex;gap:16px;flex-wrap:wrap}
 .item{display:flex;flex-direction:column;align-items:center;gap:7px}
 .box{width:66px;height:52px;background:var(--gradient-screen-soft);border:1.5px solid var(--blue-300)}
 .n{font:600 11px var(--font-display);color:var(--navy-800)}
 .px{font:400 10px var(--font-mono);color:var(--text-faint)}
</style></head><body>
<div class="row" id="r"></div>
<script>
const s=[['xs',4],['sm',6],['node',8],['md',10],['lg',14],['xl',20],['2xl',28]];
document.getElementById('r').innerHTML=s.map(([n,px])=>`<div class="item"><div class="box" style="border-radius:${px}px"></div><span class="n">radius-${n}</span><span class="px">${px}px</span></div>`).join('')+`<div class="item"><div class="box" style="border-radius:999px"></div><span class="n">radius-pill</span><span class="px">999px</span></div>`;
</script></body></html>
