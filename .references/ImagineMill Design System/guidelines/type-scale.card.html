<!-- @dsCard group="Type" viewport="700x340" name="Type Scale" subtitle="Display → caption, with tokens" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:18px 22px;background:var(--surface-card)}
 .r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
 .r:last-child{border:0}
 .t{font-family:var(--font-display);font-weight:700;color:var(--navy-800);line-height:1.1;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
 .m{font:400 11px var(--font-mono);color:var(--text-faint);white-space:nowrap}
</style></head><body>
<div class="r"><span class="t" style="font-size:44px">Display M</span><span class="m">--fs-display-m · 44px</span></div>
<div class="r"><span class="t" style="font-size:36px">Heading 1</span><span class="m">--fs-h1 · 36px</span></div>
<div class="r"><span class="t" style="font-size:28px">Heading 2</span><span class="m">--fs-h2 · 28px</span></div>
<div class="r"><span class="t" style="font-size:22px">Heading 3</span><span class="m">--fs-h3 · 22px</span></div>
<div class="r"><span class="t" style="font-size:18px;font-family:var(--font-body);font-weight:600">Body Large</span><span class="m">--fs-body-lg · 18px</span></div>
<div class="r"><span class="t" style="font-size:16px;font-family:var(--font-body);font-weight:400;color:var(--text-body)">Body — the default reading size</span><span class="m">--fs-body · 16px</span></div>
<div class="r"><span class="t" style="font-size:13px;font-family:var(--font-body);font-weight:400;color:var(--text-muted)">Caption &amp; meta</span><span class="m">--fs-caption · 13px</span></div>
</body></html>
