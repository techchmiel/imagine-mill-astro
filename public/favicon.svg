<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1080C0"/>
      <stop offset="1" stop-color="#38B0E8"/>
    </linearGradient>
  </defs>
  <!-- monitor body: brand navy rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#101840"/>
  <!-- glowing screen -->
  <rect x="10" y="10" width="44" height="44" rx="8" fill="url(#screen)"/>
  <!-- circuit trace + nodes: green → red signal -->
  <path d="M18 40 L28 40 L36 26 L46 26" fill="none" stroke="#101840" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="13" y="35" width="10" height="10" rx="3.5" fill="#78C040"/>
  <rect x="42" y="21" width="10" height="10" rx="3.5" fill="#B82028"/>
